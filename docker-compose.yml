version: "3.9"

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coldreach
      POSTGRES_PASSWORD: coldreach
      POSTGRES_DB: coldreach
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis for Celery queue
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # FastAPI backend
  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://coldreach:coldreach@postgres:5432/coldreach
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-change-in-prod
      # Generate a real Fernet key with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      ENCRYPTION_KEY: JRoaxGaMTBopkd3cTMleIFEZA2xAJfcQ15GL9ZuwurQ=
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-mock-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-mock-google-client-secret}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-mock-microsoft-client-id}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-mock-microsoft-client-secret}
      CORS_ORIGINS_STR: ${CORS_ORIGINS_STR:-http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004,http://127.0.0.1:3000,http://127.0.0.1:3003}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    working_dir: /app

  # Celery worker (sends emails)
  worker:
    build: ./backend
    command: celery -A app.workers.tasks.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://coldreach:coldreach@postgres:5432/coldreach
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-change-in-prod
      ENCRYPTION_KEY: JRoaxGaMTBopkd3cTMleIFEZA2xAJfcQ15GL9ZuwurQ=
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-mock-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-mock-google-client-secret}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-mock-microsoft-client-id}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-mock-microsoft-client-secret}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    working_dir: /app

  # Celery beat (scheduler - triggers tasks on schedule)
  beat:
    build: ./backend
    command: celery -A app.workers.tasks.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://coldreach:coldreach@postgres:5432/coldreach
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-change-in-prod
      ENCRYPTION_KEY: JRoaxGaMTBopkd3cTMleIFEZA2xAJfcQ15GL9ZuwurQ=
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-mock-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-mock-google-client-secret}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-mock-microsoft-client-id}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-mock-microsoft-client-secret}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    working_dir: /app

volumes:
  postgres_data:
